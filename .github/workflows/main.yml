name: Build BitNet Official

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake clang libopenblas-dev

      - name: Build with python script
        run: |
          # BitNet'in kendi setup sürecini taklit edelim
          pip install -r requirements.txt
          python setup_env.py --compiler clang
          
      - name: Manual CMake Fallback
        if: failure()
        run: |
          # Eğer üstteki script hata verirse, dosyaları kaba kuvvetle bulup derleyelim
          mkdir -p build
          cd build
          cmake .. -DBITNET_DEBUG=OFF
          make -j$(nproc)

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: BitNet-Artifacts
          path: |
            build/bin/*
            build/src/*.so
            build/src/*.a
